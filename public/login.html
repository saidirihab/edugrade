<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — EduGrade AI</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style.css"/>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="/" class="logo"><div class="logo-icon"><svg viewBox="0 0 18 18" fill="none"><path d="M9 1.5L11.5 6.5H16L12.5 9.5L14 15L9 12L4 15L5.5 9.5L2 6.5H6.5L9 1.5Z" fill="#1B8F6A"/></svg></div><div><div class="logo-name">EduGrade AI</div><div class="logo-sub">Prof. Rihab Saidi</div></div></a>
  <div class="nav-links"><a href="/register.html" class="btn btn-primary">Create account</a></div>
</div></nav>

<div class="auth-wrap"><div class="auth-main">
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to access your dashboard and submit your TPs.</div>
    <div class="form-error" id="errBox"></div>
    <div class="field"><label>Email address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:4px;font-size:15px" onclick="doLogin()">Sign in</button>
    <div class="auth-footer">No account yet? <a href="/register.html">Create one</a></div>
  </div>
</div></div>

<script>
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('errBox');
  err.classList.remove('show');
  if (!email || !password) { err.textContent = 'Please fill in all fields.'; err.classList.add('show'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error || 'Invalid credentials.'; err.classList.add('show'); btn.disabled=false; btn.textContent='Sign in'; return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/dashboard.html';
  } catch(e) { err.textContent = 'Connection error.'; err.classList.add('show'); btn.disabled=false; btn.textContent='Sign in'; }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
if (localStorage.getItem('token')) window.location.href='/dashboard.html';
</script>
</body></html>
